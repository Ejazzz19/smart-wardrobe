<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Wardrobe</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="authScreen" class="auth-wrap">
  <h1>Smart Wardrobe</h1>
  <div class="tagline">catalog your closet · dress for the weather</div>
  <div class="auth-card">
    <div class="auth-toggle">
      <button id="showLoginBtn" class="active" onclick="setAuthMode('login')">Log in</button>
      <button id="showRegisterBtn" onclick="setAuthMode('register')">Sign up</button>
    </div>

    <div id="loginForm">
      <label>Username</label>
      <input id="loginUsername" autocomplete="username">
      <label>Password</label>
      <input id="loginPassword" type="password" autocomplete="current-password">
      <button class="btn btn-primary" onclick="handleLogin()">Log in</button>
    </div>

    <div id="registerForm" style="display:none;">
      <label>Username</label>
      <input id="regUsername" autocomplete="username">
      <label>Email</label>
      <input id="regEmail" type="email" autocomplete="email">
      <label>Password</label>
      <input id="regPassword" type="password" autocomplete="new-password">
      <button class="btn btn-primary" onclick="handleRegister()">Create account</button>
    </div>

    <div id="authError" class="form-error"></div>
  </div>
</div>

<div id="appShell" style="display:none;">
  <header class="app-header">
    <div class="wordmark">Smart Wardrobe <span class="stitch"></span></div>
    <nav class="tabs">
      <button class="tab-btn active" data-view="today" onclick="switchView('today')">Today</button>
      <button class="tab-btn" data-view="wardrobe" onclick="switchView('wardrobe')">Wardrobe</button>
      <button class="tab-btn" data-view="history" onclick="switchView('history')">History</button>
    </nav>
    <div class="user-chip">
      <span id="userLabel"></span>
      <button onclick="handleLogout()">Log out</button>
    </div>
  </header>

  <main>

    <!-- TODAY VIEW -->
    <section id="view-today" class="view active">
      <div class="section-eyebrow">What to wear</div>
      <h2 class="section-title">Today's outfit</h2>

      <div class="weather-strip">
        <select id="todayOccasion" class="occasion-select" onchange="loadSuggestion()">
          <option value="any">Any occasion</option>
          <option value="casual" selected>Casual</option>
          <option value="formal">Formal</option>
          <option value="work">Work</option>
          <option value="sport">Sport</option>
        </select>
        <button class="btn btn-ghost" onclick="useLocationAndSuggest()">📍 Use my location</button>
        <span id="weatherPill" class="weather-pill" style="display:none;"></span>
      </div>

      <div id="flatlay" class="flatlay"></div>

      <div class="mark-worn-bar">
        <button class="btn btn-primary" style="width:auto;" onclick="markTodayWorn()">Mark this outfit as worn today</button>
        <span id="markWornStatus" style="font-family:var(--mono); font-size:11px; color:var(--ink-soft);"></span>
      </div>
    </section>

    <!-- WARDROBE VIEW -->
    <section id="view-wardrobe" class="view">
      <div class="section-eyebrow">Your closet</div>
      <h2 class="section-title">Wardrobe</h2>

      <div class="add-item-card">
        <div class="section-eyebrow" style="margin-bottom:14px;">Add an item</div>
        <div class="form-grid">
          <div class="full">
            <label>Name</label>
            <input id="newItemName" placeholder="e.g. Blue denim jacket">
          </div>
          <div>
            <label>Category</label>
            <select id="newItemCategory">
              <option value="top">Top</option>
              <option value="bottom">Bottom</option>
              <option value="dress">Dress</option>
              <option value="outerwear">Outerwear</option>
              <option value="shoes">Shoes</option>
              <option value="accessory">Accessory</option>
            </select>
          </div>
          <div>
            <label>Color</label>
            <input id="newItemColor" placeholder="e.g. blue">
          </div>
          <div>
            <label>Season</label>
            <select id="newItemSeason">
              <option value="any">Any</option>
              <option value="hot">Hot</option>
              <option value="mild" selected>Mild</option>
              <option value="cold">Cold</option>
            </select>
          </div>
          <div>
            <label>Occasion</label>
            <select id="newItemOccasion">
              <option value="any">Any</option>
              <option value="casual" selected>Casual</option>
              <option value="formal">Formal</option>
              <option value="work">Work</option>
              <option value="sport">Sport</option>
            </select>
          </div>
          <div class="full">
            <label>Photo (optional)</label>
            <input id="newItemImage" type="file" accept="image/*">
          </div>
        </div>
        <button class="btn btn-primary" style="width:auto; margin-top:16px;" onclick="handleAddItem()">Add to wardrobe</button>
        <span id="addItemStatus" class="form-error"></span>
      </div>

      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-cat="" onclick="setFilter('')">All</button>
        <button class="chip" data-cat="top" onclick="setFilter('top')">Tops</button>
        <button class="chip" data-cat="bottom" onclick="setFilter('bottom')">Bottoms</button>
        <button class="chip" data-cat="dress" onclick="setFilter('dress')">Dresses</button>
        <button class="chip" data-cat="outerwear" onclick="setFilter('outerwear')">Outerwear</button>
        <button class="chip" data-cat="shoes" onclick="setFilter('shoes')">Shoes</button>
        <button class="chip" data-cat="accessory" onclick="setFilter('accessory')">Accessories</button>
      </div>

      <div id="wardrobeGrid" class="wardrobe-grid"></div>
    </section>

    <!-- HISTORY VIEW -->
    <section id="view-history" class="view">
      <div class="section-eyebrow">The record</div>
      <h2 class="section-title">Wear history</h2>
      <div id="historyList" class="history-list"></div>
    </section>

  </main>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
